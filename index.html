<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRI — генератор подписи</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f3f4f6;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.app{max-width:1080px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 10px 30px rgba(15,23,42,.06);overflow:hidden}
.panel-head{padding:18px 20px;border-bottom:1px solid #e5e7eb}
.panel-head h2{margin:0 0 6px;font-size:20px;line-height:1.2}
.panel-head p{margin:0;font-size:13px;color:#64748b}
.form{padding:20px;display:grid;gap:13px}
label{display:grid;gap:6px;font-size:13px;color:#475569;font-weight:600}
input{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:11px 12px;font-size:15px;outline:none;background:#fff}
input:focus{border-color:#E31E24;box-shadow:0 0 0 3px rgba(227,30,36,.12)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checkbox{display:flex;align-items:center;gap:8px;color:#475569;font-weight:600;font-size:13px}
.checkbox input{width:auto}
.actions{padding:0 20px 20px;display:grid;gap:10px}
button{border:0;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:700;cursor:pointer}
.primary{background:#E31E24;color:#fff}
.secondary{background:#f1f5f9;color:#111827;border:1px solid #e2e8f0}
.preview-wrap{padding:20px}
.copy-target{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:18px;overflow:auto}
@media(max-width:920px){.grid{grid-template-columns:1fr}.app{padding:12px}}
</style>
</head>
<body spellcheck="false">
<div class="app">
  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <h2>Данные сотрудника</h2>
        <p>Заполните поля — подпись обновится автоматически.</p>
      </div>
      <div class="form">
        <label>Имя и фамилия <input id="name" value="Имя Фамилия" autocomplete="name"></label>
        <label>Должность <input id="position" value="Должность"></label>
        <label>Email <input id="email" value="info@tricompany.ru" autocomplete="email"></label>
        <label>Телефон <input id="phone" value="+7 (495) 211-33-31"></label>
        <div class="row">
          <label>Telegram <input id="telegram" value="@tri_company"></label>
          <label>WhatsApp <input id="whatsapp" value="+7 (495) 211-33-31"></label>
        </div>
        <label>Сайт <input id="site" value="www.tricompany.ru"></label>
        <label>Ссылка «Подобрать решение» <input id="solutionUrl" value="https://tricompany.ru/"></label>
        <label>Ссылка на дайджест <input id="digestUrl" value="https://tricompany.ru/"></label>
        <label class="checkbox"><input id="showTelegram" type="checkbox"> Показывать Telegram</label>
        <label class="checkbox"><input id="showWhatsapp" type="checkbox"> Показывать WhatsApp</label>
        <label class="checkbox"><input id="showDigest" type="checkbox"> Показывать блок дайджеста</label>
      </div>
      <div class="actions">
        <button class="primary" onclick="copySignature()">Скопировать подпись</button>
        <button class="secondary" onclick="downloadHtml()">Скачать HTML подписи</button>
      </div>
    </div>

    <div class="panel">
      <div class="preview-wrap">
        <div id="signature" class="copy-target"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ASSET_BASE = new URL('./assets/', window.location.href).href;
const $ = id => document.getElementById(id);

function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function phoneHref(s){return 'tel:'+String(s||'').replace(/[^\d+]/g,'');}
function mailHref(s){return 'mailto:'+String(s||'').trim();}
function siteHref(s){s=String(s||'').trim();return /^https?:\/\//i.test(s)?s:'https://'+s.replace(/^\/+/,'');}
function tgHref(s){s=String(s||'').trim();if(s.startsWith('@'))return'https://t.me/'+s.slice(1);if(/^https?:\/\//i.test(s))return s;return'https://t.me/'+s;}
function waHref(s){return 'https://wa.me/'+String(s||'').replace(/\D/g,'');}
function img(name,w,h,alt=''){return `<img src="${ASSET_BASE}${name}" width="${w}" height="${h}" alt="${alt}" style="display:block;border:0;outline:none;text-decoration:none;">`;}

function contactItem(icon, text, href, color){
 return `<td style="vertical-align:middle;padding:0 0 0 0;">${img(icon,22,22,'')}</td>
<td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:18px;color:${color};white-space:nowrap;padding:0 11px 0 5px;">
<a href="${href}" style="color:${color};text-decoration:none;">${text}</a></td>`;
}

function render(){
 const name=esc($('name').value), position=esc($('position').value), email=esc($('email').value), phone=esc($('phone').value);
 const telegram=esc($('telegram').value), whatsapp=esc($('whatsapp').value), site=esc($('site').value);
 const solutionUrl=esc(siteHref($('solutionUrl').value)), digestUrl=esc(siteHref($('digestUrl').value));
 const showDigest=$('showDigest').checked, showTelegram=$('showTelegram').checked, showWhatsapp=$('showWhatsapp').checked;

 let socialRow = '';
 if(showTelegram || showWhatsapp){
   socialRow = `<tr><td style="padding:0 0 9px 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
      <tr>
        ${showTelegram ? contactItem('icon-telegram.png', telegram, tgHref(telegram), '#111111') : ''}
        ${showWhatsapp ? contactItem('icon-whatsapp.png', whatsapp, waHref(whatsapp), '#111111') : ''}
      </tr>
    </table>
  </td></tr>`;
 }

 const digestBlock = showDigest ? `
  <tr><td style="padding:9px 0 0 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
      <tr>
        <td style="background:#fff2f3;border-radius:8px;padding:10px 12px;">
          <a href="${digestUrl}" style="display:block;text-decoration:none;color:#111111;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td width="34" style="vertical-align:middle;">${img('icon-digest.png',28,28,'')}</td>
                <td style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:18px;color:#111111;font-weight:700;text-align:left;">
                  Дайджест TRI <span style="font-weight:400;color:#111111;">— новые продукты, кейсы и материалы</span>
                </td>
                <td width="20" align="right" style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:22px;color:#E31E24;">→</td>
              </tr>
            </table>
          </a>
        </td>
      </tr>
    </table>
  </td></tr>` : '';

 const signature = `
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="480" style="width:480px;max-width:480px;border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;color:#111111;background:#ffffff;">
  <tr>
    <td style="padding:0 0 12px 0;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
        <tr>
          <td width="168" style="width:168px;vertical-align:middle;padding:0 15px 0 0;text-align:left;">
            ${img('tri-logo.png',150,44,'TRI')}
          </td>
          <td width="1" style="width:1px;background:#cfcfcf;font-size:0;line-height:0;">&nbsp;</td>
          <td width="311" style="width:311px;vertical-align:middle;padding:0 0 0 15px;text-align:left;">
            <div style="font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:24px;font-weight:700;color:#111111;">${name}</div>
            <div style="margin-top:4px;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:18px;color:#777777;">
              ${position} <span style="color:#111111;padding:0 6px;">|</span> <span style="color:#E31E24;font-weight:700;letter-spacing:1.2px;">TRI</span>
            </div>
            <div style="margin-top:10px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:17px;color:#111111;">
              Российский разработчик и производитель<br>
              клеевых систем, герметиков,<br>
              компаундов и покрытий
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr><td style="height:1px;background:#d7d7d7;font-size:0;line-height:0;">&nbsp;</td></tr>

  <tr>
    <td style="padding:10px 0;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
        <tr>
          <td width="50%" style="width:50%;vertical-align:middle;text-align:center;padding:0 8px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
              <tr>
                <td width="29" style="vertical-align:middle;">${img('icon-flask.png',24,24,'')}</td>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:16px;color:#111111;vertical-align:middle;text-align:left;padding-left:6px;">
                  <span style="font-size:13px;color:#E31E24;font-weight:700;white-space:nowrap;">500+</span> разработанных<br>продуктов
                </td>
              </tr>
            </table>
          </td>
          <td width="1" style="width:1px;background:#d7d7d7;font-size:0;line-height:0;">&nbsp;</td>
          <td width="50%" style="width:50%;vertical-align:middle;text-align:center;padding:0 8px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
              <tr>
                <td width="29" style="vertical-align:middle;">${img('icon-globe.png',24,24,'')}</td>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:16px;color:#111111;vertical-align:middle;text-align:left;padding-left:6px;">
                  <span style="font-size:13px;color:#E31E24;font-weight:700;white-space:nowrap;">10+</span> отраслей<br>применения
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr><td colspan="3" style="height:10px;font-size:0;line-height:0;">&nbsp;</td></tr>
        <tr>
          <td colspan="3" style="vertical-align:middle;text-align:center;padding:0;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
              <tr>
                <td width="29" style="vertical-align:middle;">${img('icon-factory.png',24,24,'')}</td>
                <td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:16px;color:#111111;vertical-align:middle;text-align:left;padding-left:6px;">
                  Лаборатория и производство полного цикла
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr><td style="height:1px;background:#d7d7d7;font-size:0;line-height:0;">&nbsp;</td></tr>

  <tr><td style="padding:9px 0 0 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
      <tr>
        <td style="background:#f7f7f7;border-radius:8px;padding:10px 12px;">
          <a href="${solutionUrl}" style="display:block;text-decoration:none;color:#111111;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
              <tr>
                <td width="32" style="vertical-align:middle;">${img('icon-target.png',26,26,'')}</td>
                <td style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:17px;color:#111111;font-weight:700;text-align:left;">
                  Подобрать решение <span style="font-weight:400;">под вашу задачу</span>
                </td>
                <td width="18" align="right" style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:20px;color:#E31E24;">→</td>
              </tr>
            </table>
          </a>
        </td>
      </tr>
    </table>
  </td></tr>

  ${digestBlock}

  <tr><td style="padding:11px 0 8px 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
      <tr>
        ${contactItem('icon-phone.png', phone, phoneHref(phone), '#111111')}
        ${contactItem('icon-mail.png', email, mailHref(email), '#111111')}
      </tr>
    </table>
  </td></tr>

  <tr><td style="padding:0 0 8px 0;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:0 auto;">
      <tr>
        ${contactItem('icon-site.png', site, siteHref(site), '#E31E24')}
      </tr>
    </table>
  </td></tr>

  ${socialRow}

  <tr><td style="height:2px;background:#E31E24;font-size:0;line-height:0;">&nbsp;</td></tr>
</table>`;

 $('signature').innerHTML=signature;
 return signature;
}

function copySignature(){
 const node=$('signature');
 const range=document.createRange();
 range.selectNodeContents(node);
 const selection=window.getSelection();
 selection.removeAllRanges();
 selection.addRange(range);
 document.execCommand('copy');
 selection.removeAllRanges();
 alert('Подпись скопирована');
}

function downloadHtml(){
 const html=render();
 const blob=new Blob([html],{type:'text/html;charset=utf-8'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='tri-email-signature.html';
 document.body.appendChild(a);
 a.click();
 a.remove();
 URL.revokeObjectURL(a.href);
}

document.querySelectorAll('input').forEach(input=>input.addEventListener('input',render));
render();
</script>
</body>
</html>
